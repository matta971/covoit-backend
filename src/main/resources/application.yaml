spring:
  application:
    name: covoit-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  docker:
    compose:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/covoit}
    username: ${DB_USERNAME:covoit}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "${JWT_SECRET}"
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 2592000
    issuer: covoit-backend
    audience: covoit-app
